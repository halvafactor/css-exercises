<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="regular-class">Number 1 - I'm a class!</p>
    <div id="big-id">Number 2 - I'm one ID.</div>
    <p class="cool-class">Number 3 - I'm a class, but cooler!</p>
    <div id="bold-id">Number 4 - I'm another ID.</div>
    <p class="regular-class">Number 5 - I'm a class!</p>
  </body>
</html>

<!-- See style.css comment for another way to group style rules. Using
 it would mean the body of this file would look like this:
 
 <body>
    <p class="class">Number 1 - I'm a class!</p>
    <div id="big-id">Number 2 - I'm one ID.</div>
    <p class="class adjust-font-size">Number 3 - I'm a class, but cooler!</p>
    <div id="bold-id" class="adjust-font-size">Number 4 - I'm another ID.</div>
    <p class="class">Number 5 - I'm a class!</p>
  </body>
 
 notice that one div has an id and a class -->
